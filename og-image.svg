<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Background gradient: solid blue with subtle depth -->
    <linearGradient id="bgGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5A96E8"/>
      <stop offset="100%" stop-color="#3A72C4"/>
    </linearGradient>

    <!-- Bottom fade overlay -->
    <linearGradient id="bottomFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.08"/>
    </linearGradient>

    <!-- Subtle top-left radial light -->
    <radialGradient id="topLight" cx="20%" cy="15%" r="60%">
      <stop offset="0%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Base background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Radial light overlay -->
  <rect width="1200" height="630" fill="url(#topLight)"/>

  <!-- Bottom gradient overlay -->
  <rect width="1200" height="630" fill="url(#bottomFade)"/>

  <!-- Decorative background geometry: large circle top-right -->
  <circle cx="1080" cy="-40" r="320" fill="white" fill-opacity="0.05"/>
  <circle cx="1120" cy="20" r="180" fill="white" fill-opacity="0.04"/>

  <!-- Decorative bottom-left circle -->
  <circle cx="-60" cy="680" r="260" fill="white" fill-opacity="0.04"/>

  <!-- Thin horizontal rule below title area -->
  <rect x="80" y="310" width="120" height="2" rx="1" fill="white" fill-opacity="0.5"/>

  <!-- ===== TEXT CONTENT ===== -->

  <!-- Label: small caps category tag -->
  <text
    x="80"
    y="175"
    font-family="'Helvetica Neue', Helvetica, Arial, system-ui, sans-serif"
    font-size="16"
    font-weight="600"
    letter-spacing="3"
    fill="white"
    fill-opacity="0.75"
    text-anchor="start">MIKROLERNEN · MEDIZIN · DACH</text>

  <!-- Main heading: MicroSkills -->
  <text
    x="80"
    y="280"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="90"
    font-weight="700"
    fill="white"
    fill-opacity="1"
    text-anchor="start"
    dominant-baseline="auto">MicroSkills</text>

  <!-- Subtitle line 1 -->
  <text
    x="80"
    y="355"
    font-family="'Helvetica Neue', Helvetica, Arial, system-ui, sans-serif"
    font-size="34"
    font-weight="300"
    fill="white"
    fill-opacity="0.92"
    text-anchor="start"
    letter-spacing="0.5">Spezielle Krankheitslehre · Physiotherapie</text>

  <!-- Tagline -->
  <text
    x="80"
    y="410"
    font-family="'Helvetica Neue', Helvetica, Arial, system-ui, sans-serif"
    font-size="22"
    font-weight="400"
    fill="white"
    fill-opacity="0.72"
    text-anchor="start"
    letter-spacing="0.3">Prüfungsvorbereitung für die Staatsprüfung</text>

  <!-- ===== BOTTOM BAR ===== -->
  <!-- Thin bottom accent line -->
  <rect x="0" y="610" width="1200" height="20" fill="white" fill-opacity="0.06"/>

  <!-- Domain / brand bottom-left -->
  <text
    x="80"
    y="598"
    font-family="'Helvetica Neue', Helvetica, Arial, system-ui, sans-serif"
    font-size="17"
    font-weight="400"
    fill="white"
    fill-opacity="0.55"
    text-anchor="start"
    letter-spacing="0.5">microskills.app</text>

  <!-- ===== EKG / PULSE ICON — bottom right ===== -->
  <!-- Bounding area: x 900–1140, y 460–580 -->
  <!-- EKG line path: flat → small bump → sharp spike → undershoot → return flat -->
  <g opacity="0.30">
    <polyline
      points="900,530 960,530 980,530 992,518 1002,545 1012,490 1022,555 1032,530 1050,530 1140,530"
      fill="none"
      stroke="white"
      stroke-width="3.5"
      stroke-linecap="round"
      stroke-linejoin="round"/>
  </g>

  <!-- Heart rate / medical cross icon top-right corner (subtle) -->
  <g opacity="0.18" transform="translate(1090, 80)">
    <!-- Vertical bar of cross -->
    <rect x="-8" y="-28" width="16" height="56" rx="5" fill="white"/>
    <!-- Horizontal bar of cross -->
    <rect x="-28" y="-8" width="56" height="16" rx="5" fill="white"/>
  </g>

  <!-- Small pill/capsule accent shapes — subtle decoration -->
  <ellipse cx="1155" cy="430" rx="28" ry="10" fill="white" fill-opacity="0.07" transform="rotate(-35 1155 430)"/>
  <ellipse cx="1130" cy="460" rx="18" ry="7" fill="white" fill-opacity="0.05" transform="rotate(-35 1130 460)"/>

</svg>
